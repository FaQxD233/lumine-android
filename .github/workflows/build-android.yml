name: Build Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (必填，例如: v0.2.1)'
        required: true
        default: 'v0.2.1'
      create_release:
        description: '创建 GitHub Release'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          echo "tag=${version}" >> "$GITHUB_OUTPUT"
          echo "name=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.2.12479018"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install gomobile
        shell: bash
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go mobile AAR
        shell: bash
        env:
          GOFLAGS: -mod=mod
        run: |
          mkdir -p android/app/libs
          gomobile bind \
            -target=android \
            -androidapi 24 \
            -tags=godns \
            -o android/app/libs/LumineCore.aar \
            ./mobile

      - name: Decode release signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Build APKs
        working-directory: android
        shell: bash
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ github.run_number }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Collect APKs
        shell: bash
        run: |
          mkdir -p dist
          find android/app/build/outputs/apk/release -type f -name '*.apk' -print -exec cp {} dist/ \;
          ls -lah dist

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumine-android-${{ inputs.version }}
          path: dist/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Lumine Android ${{ inputs.version }}
          files: dist/*.apk
          generate_release_notes: true
